<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Will you be my Valentine?</title>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #ffd6e7;
      --bg2: #ffeef6;
      --card: #ffffffcc;
      --yes: #ff3b7a;
      --yesHover: #ff1f68;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      font-family: system-ui, sans-serif;
      overflow: hidden;
      padding: 16px;
    }

    /* FULL-SCREEN CONFETTI CANVAS */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      width: min(720px, 92vw);
      padding: 26px 22px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0,0,0,.15);
    }

    .art {
      width: min(260px, 80vw);
      margin: 0 auto 10px;
      display: block;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.12));
    }

    h1 {
      font-size: clamp(26px, 4vw, 44px);
      margin: 12px 0 18px;
    }

    .button-zone {
      position: relative;
      width: min(520px, 92%);
      height: 150px;
      margin: 0 auto;
      touch-action: none;
    }

    button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,.14);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, background .12s ease;
    }

    #yesBtn {
      left: 18%;
      background: var(--yes);
      color: #fff;
    }
    #yesBtn:hover { background: var(--yesHover); }

    #noBtn {
      left: 62%;
      background: #e5e7eb;
      color: #111827;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      opacity: .7;
    }

    .result {
      display: none;
      margin-top: 18px;
      animation: pop .35s ease;
    }

    .result h2 {
      font-size: clamp(30px, 4.5vw, 46px);
      margin: 10px 0;
    }

    .fireworks {
      width: min(380px, 90vw);
      margin: 0 auto;
      display: block;
    }

    @keyframes pop {
      from { transform: scale(.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <main class="card">
    <!-- ELEPHANT WITH HEART -->
    <svg class="art" viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="elBody" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#b0bec5"/>
          <stop offset="1" stop-color="#78909c"/>
        </linearGradient>
        <linearGradient id="elLight" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#cfd8dc"/>
          <stop offset="1" stop-color="#b0bec5"/>
        </linearGradient>
        <linearGradient id="heart" x1="0" x2="1">
          <stop offset="0" stop-color="#ff4d7d"/>
          <stop offset="1" stop-color="#ff1f68"/>
        </linearGradient>
      </defs>

      <!-- Body -->
      <ellipse cx="160" cy="185" rx="88" ry="68" fill="url(#elBody)"/>

      <!-- Head -->
      <ellipse cx="160" cy="115" rx="72" ry="65" fill="url(#elBody)"/>

      <!-- Left ear -->
      <ellipse cx="98" cy="110" rx="30" ry="38" fill="url(#elLight)"/>
      <ellipse cx="101" cy="112" rx="18" ry="25" fill="#ffcdd2"/>

      <!-- Right ear -->
      <ellipse cx="222" cy="110" rx="30" ry="38" fill="url(#elLight)"/>
      <ellipse cx="219" cy="112" rx="18" ry="25" fill="#ffcdd2"/>

      <!-- Trunk -->
      <path d="M148 158 C140 170 130 185 128 205 C126 218 132 228 140 228 C148 228 152 218 150 205 C148 192 155 178 160 165Z"
            fill="url(#elBody)"/>

      <!-- Legs -->
      <rect x="108" y="238" width="34" height="22" rx="10" fill="url(#elBody)"/>
      <rect x="178" y="238" width="34" height="22" rx="10" fill="url(#elBody)"/>
      <rect x="96"  y="230" width="34" height="22" rx="10" fill="url(#elBody)"/>
      <rect x="190" y="230" width="34" height="22" rx="10" fill="url(#elBody)"/>

      <!-- Eyes -->
      <circle cx="138" cy="105" r="10" fill="white"/>
      <circle cx="182" cy="105" r="10" fill="white"/>
      <circle cx="140" cy="106" r="6" fill="#37474f"/>
      <circle cx="184" cy="106" r="6" fill="#37474f"/>
      <circle cx="141" cy="104" r="2" fill="white"/>
      <circle cx="185" cy="104" r="2" fill="white"/>

      <!-- Smile -->
      <path d="M148 135 Q160 145 172 135" stroke="#546e7a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- Blush -->
      <ellipse cx="122" cy="125" rx="12" ry="7" fill="#ff8a9a" opacity="0.5"/>
      <ellipse cx="198" cy="125" rx="12" ry="7" fill="#ff8a9a" opacity="0.5"/>

      <!-- Heart held by trunk tip -->
      <path d="M118 208 C118 197 130 192 136 200
               C142 192 154 197 154 208
               C154 222 136 232 136 238
               C136 232 118 222 118 208Z"
            fill="url(#heart)"/>

      <!-- Tail -->
      <path d="M246 175 C260 168 268 155 264 148" stroke="#78909c" stroke-width="5" fill="none" stroke-linecap="round"/>
      <circle cx="264" cy="146" r="5" fill="#b0bec5"/>
    </svg>

    <h1>polen will you be my valentine?</h1>

    <section class="button-zone" id="zone">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </section>

    <!-- HINT -->
    <div class="hint" id="hint">"No" seems a bit shy 😈</div>

    <section class="result" id="result">
      <h2>YAY! 🎉</h2>
      <img
        class="fireworks"
        src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif"
        alt="Fireworks"
      />
    </section>
  </main>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const hint = document.getElementById("hint");

    /* ---------- CONFETTI ---------- */
    const confettiCanvas = document.getElementById("confettiCanvas");

    function resizeConfettiCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      confettiCanvas.style.width = "100vw";
      confettiCanvas.style.height = "100vh";
    }

    resizeConfettiCanvas();
    window.addEventListener("resize", resizeConfettiCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeConfettiCanvas, 150));

    const confettiInstance = confetti.create(confettiCanvas, {
      resize: false,
      useWorker: true
    });

    function fullScreenConfetti() {
      const end = Date.now() + 1600;

      (function frame() {
        confettiInstance({
          particleCount: 12,
          spread: 90,
          startVelocity: 45,
          ticks: 180,
          origin: { x: Math.random(), y: Math.random() * 0.3 }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();

      setTimeout(() => {
        confettiInstance({
          particleCount: 300,
          spread: 140,
          startVelocity: 60,
          ticks: 220,
          origin: { x: 0.5, y: 0.55 }
        });
      }, 300);
    }

    /* ---------- YES BUTTON GROWS ---------- */
    let yesScale = 1;
    function growYes() {
      yesScale = Math.min(2.2, yesScale + 0.1);
      yesBtn.style.transform = `translateY(-50%) scale(${yesScale})`;
    }

    /* ---------- NO BUTTON RUNS AWAY ---------- */
    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function moveNo(px, py) {
      const z = zone.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();

      let dx = (b.left + b.width / 2) - px;
      let dy = (b.top + b.height / 2) - py;
      let mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      let newLeft = (b.left - z.left) + dx * 150;
      let newTop  = (b.top - z.top) + dy * 150;

      newLeft = clamp(newLeft, 0, z.width - b.width);
      newTop  = clamp(newTop, 0, z.height - b.height);

      noBtn.style.left = newLeft + "px";
      noBtn.style.top = newTop + "px";
      noBtn.style.transform = "none";

      growYes();
    }

    zone.addEventListener("pointermove", e => {
      const b = noBtn.getBoundingClientRect();
      const d = Math.hypot(
        (b.left + b.width / 2) - e.clientX,
        (b.top + b.height / 2) - e.clientY
      );
      if (d < 140) moveNo(e.clientX, e.clientY);
    });

    noBtn.addEventListener("click", e => e.preventDefault());

    /* ---------- YES CLICK ---------- */
    yesBtn.addEventListener("click", () => {
      zone.style.display = "none";
      hint.style.display = "none";
      result.style.display = "block";
      resizeConfettiCanvas();
      fullScreenConfetti();
    });
  </script>
</body>
</html>
